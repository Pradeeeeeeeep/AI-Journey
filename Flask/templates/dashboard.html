<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      color: #333;
    }
    .dashboard {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }
    .dashboard h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }
    .info-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .info-card {
      background: #f9fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .info-card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .info-card p {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      color: #111827;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>User Dashboard</h1>
    <div class="info-grid">
      <div class="info-card">
        <h2>Name</h2>
        <p>{{name}}</p>
      </div>
      <div class="info-card">
        <h2>Age</h2>
        <p>{{age}}</p>
      </div>
      <div class="info-card">
        <h2>City</h2>
        <p>{{city}}</p>
      </div>
      <div class="info-card">
        <h2>Course</h2>
        <p>{{course}}</p>
      </div>
    </div>
  </div>
</body>
</html>
